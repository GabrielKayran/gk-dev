<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 px-6 py-4"
  [class.backdrop-blur-md]="scrolled()"
  [class.bg-bg-base/80]="scrolled()"
  [class.border-b]="scrolled()"
  [class.border-white/5]="scrolled()"
>
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <a href="#hero" class="font-mono text-violet-electric font-medium text-lg tracking-tight">
      &lt;<span class="text-text-primary">GK</span> /&gt;
    </a>

    <div class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.fragment) {
        <a
          [href]="'#' + link.fragment"
          class="text-text-muted hover:text-text-primary transition-colors duration-200 text-sm font-medium"
        >
          {{ link.labelKey | translate }}
        </a>
      }
    </div>

    <div class="hidden md:flex items-center gap-4">
      <button
        (click)="switchLang()"
        class="font-mono text-xs text-text-muted hover:text-text-primary transition-colors duration-200 border border-white/10 hover:border-violet-electric/40 px-2.5 py-1 rounded-md"
        [attr.aria-label]="'Switch language to ' + (currentLang() === 'pt' ? 'English' : 'Português')"
      >
        {{ currentLang() === 'pt' ? 'EN' : 'PT' }}
      </button>

      <a
        href="#contact"
        class="inline-flex items-center gap-2 gradient-border px-4 py-2 rounded-lg text-sm font-medium text-text-primary"
      >
        <span class="w-2 h-2 rounded-full bg-cyan-electric animate-pulse"></span>
        {{ 'NAV.CTA' | translate }}
      </a>
    </div>

    <div class="md:hidden flex items-center gap-3">
      <button
        (click)="switchLang()"
        class="font-mono text-xs text-text-muted hover:text-text-primary transition-colors border border-white/10 hover:border-violet-electric/40 px-2 py-1 rounded-md"
      >
        {{ currentLang() === 'pt' ? 'EN' : 'PT' }}
      </button>

      <button
        class="text-text-muted hover:text-text-primary transition-colors"
        (click)="toggleMenu()"
        aria-label="Toggle menu"
      >
        @if (menuOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>
  </div>

  @if (menuOpen()) {
    <div class="md:hidden mt-4 pb-4 border-t border-white/10 pt-4 flex flex-col gap-4">
      @for (link of navLinks; track link.fragment) {
        <a
          [href]="'#' + link.fragment"
          class="text-text-muted hover:text-text-primary transition-colors text-sm font-medium px-2"
          (click)="closeMenu()"
        >
          {{ link.labelKey | translate }}
        </a>
      }
      <a
        href="mailto:gabrielkayran@gmail.com"
        class="inline-flex items-center gap-2 gradient-border px-4 py-2 rounded-lg text-sm font-medium text-text-primary w-fit"
        (click)="closeMenu()"
      >
        <span class="w-2 h-2 rounded-full bg-cyan-electric animate-pulse"></span>
        {{ 'NAV.CTA' | translate }}
      </a>
    </div>
  }
</nav>
